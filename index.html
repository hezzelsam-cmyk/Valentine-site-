<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message for Alice - Page 1</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #000000; /* black background */
        color: #FFD700; /* golden text */
        overflow: hidden;
    }
    .content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        text-align: center;
        padding: 50px;
        box-sizing: border-box;
        font-size: 2em;
        line-height: 1.8em;
    }
    .nav-button {
        position: fixed;
        bottom: 30px;
        background-color: #FFD700;
        border: none;
        padding: 15px 25px;
        font-size: 1.2em;
        color: #000;
        cursor: pointer;
        border-radius: 12px;
        transition: 0.3s;
    }
    .nav-button:hover {
        background-color: #FFC300;
    }
    .floating {
        position: absolute;
        font-size: 2em;
        animation: float 10s infinite linear;
        pointer-events: none;
    }
    @keyframes float {
        0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-50vh) translateX(50px) rotate(360deg); opacity: 0; }
    }
</style>
</head>
<body>

<div class="content">
    <h1>Alice,</h1>
    <p>I’ve taken time to sit with everything not from anger, not from desperation, but from a place of reflection. 
    I don’t want this to be noise or emotion speaking over itself. I want this to be something you can read slowly 
    and truly understand my heart.</p>
    <button class="nav-button" onclick="location.href='story.html'">Next ➡️</button>
</div>

<!-- Floating hearts, stars, rings -->
<div class="floating" style="top:10%; left:15%;">💖</div>
<div class="floating" style="top:30%; left:70%;">✨</div>
<div class="floating" style="top:60%; left:40%;">💍</div>
<div class="floating" style="top:80%; left:20%;">❤️</div>
<div class="floating" style="top:50%; left:80%;">⭐</div>

</body>
</html>
